<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>津田沼駅の立地の良さ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px 0;
            text-align: center;
        }
        section {
            padding: 20px;
        }
        .highlight {
            color: #4CAF50;
            font-weight: bold;
        }
        footer {
            text-align: center;
            padding: 10px 0;
            background-color: #333;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>津田沼駅の立地の良さ</h1>
    </header>

    <section>
        <h2>交通アクセスの良さ</h2>
        <p>
            <span class="highlight">津田沼駅</span>は、東京駅まで直通28分でが通ります。さらに、
            <span class="highlight">3路線</span>が交わるターミナル駅で、多方面への移動がスムーズです。
        </p>
    </section>

    <section>
        <h2>駅周辺の生活環境</h2>
        <p>
            駅周辺の商業施設にはスーパーマーケットや飲食店が充実しており、日常の買い物に便利です。
            また、駅周辺は閑静な住宅街が広がっており、落ち着いた暮らしを求める方に最適な環境です。
        </p>
    </section>

    <footer>
        <p>&copy; 2024 駅の紹介サイト</p>
    </footer>
</body>
</html>
